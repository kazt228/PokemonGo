<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon GO イベントカレンダー</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #65708a;
      --line: #dbe2ef;
      --blue: #2f6fed;
      --green: #1f9d72;
      --red: #d84b4b;
      --yellow: #f2b43b;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    select {
      font: inherit;
    }

    .topbar {
      background: #172033;
      color: #fff;
      border-bottom: 4px solid var(--yellow);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(#d84b4b 0 47%, #172033 47% 53%, #ffffff 53% 100%);
      border: 3px solid #fff;
      box-shadow: inset 0 0 0 3px #172033;
      flex: 0 0 auto;
      position: relative;
    }

    .mark::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #172033;
      position: absolute;
      inset: 0;
      margin: auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .toplink {
      color: #d8e2f5;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 18px 44px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .summary {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 16px;
    }

    .toolbar {
      padding: 14px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      gap: 10px;
      align-items: center;
    }

    .month-title {
      text-align: center;
      font-weight: 900;
      font-size: 18px;
    }

    .field {
      display: grid;
      gap: 4px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    select,
    button {
      min-height: 38px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
    }

    button {
      cursor: pointer;
      font-weight: 800;
    }

    .primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .today-panel {
      padding: 16px;
      margin-bottom: 16px;
      display: grid;
      gap: 10px;
    }

    .today-panel h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .event-list {
      display: grid;
      gap: 12px;
    }

    .event-card {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .event-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .event-title {
      display: grid;
      gap: 4px;
    }

    .event-title strong {
      font-size: 18px;
      letter-spacing: 0;
    }

    .meta,
    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .status {
      padding: 5px 9px;
      border-radius: 999px;
      white-space: nowrap;
      background: #eef3ff;
      color: #244c9a;
      font-weight: 900;
      font-size: 12px;
    }

    .status.live {
      background: #e9f8f2;
      color: #166f51;
    }

    .status.today {
      background: #fff7df;
      color: #8a5b00;
    }

    .status.ended {
      background: #f0f2f6;
      color: #65708a;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: #244c9a;
      font-size: 12px;
      font-weight: 800;
    }

    .source-link {
      color: var(--blue);
      font-weight: 800;
      text-decoration: none;
      justify-self: start;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--line);
    }

    .weekday,
    .day {
      background: #fff;
      min-width: 0;
    }

    .weekday {
      padding: 9px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .day {
      min-height: 118px;
      padding: 8px;
      display: grid;
      align-content: start;
      gap: 6px;
    }

    .day.outside {
      background: #f7f9fd;
      color: #a2abc0;
    }

    .day-number {
      font-weight: 900;
      font-size: 13px;
    }

    .calendar-event {
      border: 0;
      border-radius: 6px;
      padding: 5px 6px;
      background: #eef3ff;
      color: #244c9a;
      text-align: left;
      font-size: 12px;
      font-weight: 800;
      min-height: 0;
      line-height: 1.35;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .month-title {
        grid-column: 1 / -1;
        order: -1;
      }

      .day {
        min-height: 92px;
        padding: 6px;
      }
    }

    @media (max-width: 560px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .calendar {
        font-size: 12px;
      }

      .weekday {
        padding: 7px 3px;
      }

      .day {
        min-height: 78px;
      }

      .calendar-event {
        font-size: 11px;
        padding: 4px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <h1>Pokemon GO イベントカレンダー</h1>
      </div>
      <a class="toplink" href="./index.html">ツール一覧</a>
    </div>
  </header>
  <main>
    <p class="summary">公式情報をもとに、日本時間でイベント予定を確認できます。現地開催イベントは日本時間換算の目安も表示します。</p>

    <section class="panel toolbar" aria-label="表示設定">
      <button id="prevMonth" type="button">前月</button>
      <div id="monthTitle" class="month-title"></div>
      <button id="nextMonth" type="button">翌月</button>
      <div class="field">
        <label for="categoryFilter">種別</label>
        <select id="categoryFilter">
          <option value="all">すべて</option>
          <option value="event">通常イベント</option>
          <option value="live">リアルイベント</option>
          <option value="global">グローバル</option>
          <option value="pass">GOパス</option>
          <option value="raid">レイド</option>
          <option value="spotlight">スポットライト</option>
        </select>
      </div>
      <div class="field">
        <label for="statusFilter">状態</label>
        <select id="statusFilter">
          <option value="all">すべて</option>
          <option value="active">開催中</option>
          <option value="upcoming">今後</option>
          <option value="ended">終了</option>
        </select>
      </div>
      <div class="field">
        <label for="viewMode">表示</label>
        <select id="viewMode">
          <option value="list">リスト</option>
          <option value="calendar">月間カレンダー</option>
        </select>
      </div>
      <button id="todayButton" class="primary" type="button">今月</button>
    </section>

    <section class="panel today-panel">
      <h2>今日のイベント</h2>
      <div id="todayEvents" class="event-list"></div>
    </section>

    <section id="listView" class="view active">
      <div id="eventList" class="event-list"></div>
    </section>

    <section id="calendarView" class="view">
      <div id="calendar" class="calendar"></div>
    </section>
  </main>

  <script src="./pokemon-go-events.js"></script>
  <script>
    const EVENTS = (window.POKEMON_GO_EVENTS || []).map((event) => ({
      ...event,
      start: new Date(event.startsAt),
      end: new Date(event.endsAt)
    })).sort((a, b) => a.start - b.start);

    const CATEGORY_LABELS = {
      event: "通常イベント",
      live: "リアルイベント",
      global: "グローバル",
      pass: "GOパス",
      raid: "レイド",
      spotlight: "スポットライト"
    };

    const state = {
      currentMonth: startOfMonth(new Date()),
      category: "all",
      status: "all",
      view: "list"
    };

    const elements = {
      prevMonth: document.querySelector("#prevMonth"),
      nextMonth: document.querySelector("#nextMonth"),
      todayButton: document.querySelector("#todayButton"),
      monthTitle: document.querySelector("#monthTitle"),
      categoryFilter: document.querySelector("#categoryFilter"),
      statusFilter: document.querySelector("#statusFilter"),
      viewMode: document.querySelector("#viewMode"),
      todayEvents: document.querySelector("#todayEvents"),
      eventList: document.querySelector("#eventList"),
      calendar: document.querySelector("#calendar"),
      listView: document.querySelector("#listView"),
      calendarView: document.querySelector("#calendarView")
    };

    function startOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function addMonths(date, amount) {
      return new Date(date.getFullYear(), date.getMonth() + amount, 1);
    }

    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function overlapsDay(event, day) {
      const start = new Date(day.getFullYear(), day.getMonth(), day.getDate(), 0, 0, 0);
      const end = new Date(day.getFullYear(), day.getMonth(), day.getDate() + 1, 0, 0, 0);
      return event.start < end && event.end > start;
    }

    function overlapsMonth(event, month) {
      const start = startOfMonth(month);
      const end = addMonths(start, 1);
      return event.start < end && event.end > start;
    }

    function eventStatus(event, now = new Date()) {
      if (event.start <= now && now < event.end) return "active";
      if (sameDay(event.start, now)) return "today";
      if (event.end <= now) return "ended";
      return "upcoming";
    }

    function statusLabel(status) {
      return { active: "開催中", today: "今日開始", upcoming: "今後", ended: "終了" }[status] || status;
    }

    function statusClass(status) {
      if (status === "active") return "live";
      if (status === "today") return "today";
      if (status === "ended") return "ended";
      return "";
    }

    function formatDateTime(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        weekday: "short",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function formatPeriod(event) {
      return `${formatDateTime(event.start)} - ${formatDateTime(event.end)} 日本時間`;
    }

    function filteredEvents({ monthOnly = true } = {}) {
      const now = new Date();
      return EVENTS.filter((event) => {
        const status = eventStatus(event, now);
        const statusGroup = status === "today" ? "upcoming" : status;
        return (!monthOnly || overlapsMonth(event, state.currentMonth)) &&
          (state.category === "all" || event.category === state.category) &&
          (state.status === "all" || statusGroup === state.status || status === state.status);
      });
    }

    function eventCard(event) {
      const status = eventStatus(event);
      return `
        <article class="panel event-card">
          <div class="event-head">
            <div class="event-title">
              <strong>${event.title}</strong>
              <span class="meta">${CATEGORY_LABELS[event.category] || event.category} / ${formatPeriod(event)}</span>
            </div>
            <span class="status ${statusClass(status)}">${statusLabel(status)}</span>
          </div>
          <p class="note">${event.summary}</p>
          ${event.displayTimeNote ? `<p class="note">${event.displayTimeNote}</p>` : ""}
          <div class="chips">${(event.highlights || []).map((highlight) => `<span class="chip">${highlight}</span>`).join("")}</div>
          ${event.sourceUrl ? `<a class="source-link" href="${event.sourceUrl}" target="_blank" rel="noreferrer">公式情報を開く</a>` : ""}
        </article>
      `;
    }

    function renderTodayEvents() {
      const today = new Date();
      const rows = EVENTS.filter((event) => overlapsDay(event, today) && eventStatus(event) !== "ended");
      elements.todayEvents.innerHTML = rows.length
        ? rows.map(eventCard).join("")
        : '<div class="empty">今日開催中の登録イベントはありません。</div>';
    }

    function renderList() {
      const rows = filteredEvents().sort((a, b) => a.start - b.start);
      elements.eventList.innerHTML = rows.length
        ? rows.map(eventCard).join("")
        : '<div class="panel empty">この条件のイベントはありません。</div>';
    }

    function renderCalendar() {
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      const month = state.currentMonth;
      const first = startOfMonth(month);
      const gridStart = new Date(first.getFullYear(), first.getMonth(), first.getDate() - first.getDay());
      const days = [];
      for (let index = 0; index < 42; index += 1) {
        days.push(new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + index));
      }

      const header = weekdays.map((day) => `<div class="weekday">${day}</div>`).join("");
      const body = days.map((day) => {
        const events = filteredEvents({ monthOnly: false })
          .filter((event) => overlapsDay(event, day))
          .slice(0, 3);
        return `
          <div class="day ${day.getMonth() === month.getMonth() ? "" : "outside"}">
            <div class="day-number">${day.getDate()}</div>
            ${events.map((event) => `<button class="calendar-event" type="button" title="${event.title}">${event.title}</button>`).join("")}
          </div>
        `;
      }).join("");

      elements.calendar.innerHTML = header + body;
    }

    function render() {
      elements.monthTitle.textContent = new Intl.DateTimeFormat("ja-JP", { year: "numeric", month: "long" }).format(state.currentMonth);
      elements.listView.classList.toggle("active", state.view === "list");
      elements.calendarView.classList.toggle("active", state.view === "calendar");
      renderTodayEvents();
      renderList();
      renderCalendar();
    }

    elements.prevMonth.addEventListener("click", () => {
      state.currentMonth = addMonths(state.currentMonth, -1);
      render();
    });
    elements.nextMonth.addEventListener("click", () => {
      state.currentMonth = addMonths(state.currentMonth, 1);
      render();
    });
    elements.todayButton.addEventListener("click", () => {
      state.currentMonth = startOfMonth(new Date());
      render();
    });
    elements.categoryFilter.addEventListener("change", () => {
      state.category = elements.categoryFilter.value;
      render();
    });
    elements.statusFilter.addEventListener("change", () => {
      state.status = elements.statusFilter.value;
      render();
    });
    elements.viewMode.addEventListener("change", () => {
      state.view = elements.viewMode.value;
      render();
    });

    render();
  </script>
</body>
</html>
