<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon GO 個体値ランクチェッカー</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #65708a;
      --line: #dbe2ef;
      --blue: #2f6fed;
      --green: #1f9d72;
      --red: #d84b4b;
      --yellow: #f2b43b;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      background: #172033;
      color: #fff;
      border-bottom: 4px solid var(--yellow);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background:
        linear-gradient(#d84b4b 0 47%, #172033 47% 53%, #ffffff 53% 100%);
      border: 3px solid #fff;
      box-shadow: inset 0 0 0 3px #172033;
      flex: 0 0 auto;
      position: relative;
    }

    .mark::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #172033;
      position: absolute;
      inset: 0;
      margin: auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      letter-spacing: 0;
      line-height: 1.2;
    }

    .updated {
      color: #c9d3e8;
      font-size: 13px;
      white-space: nowrap;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 18px 44px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .grid > * {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .panel-body {
      padding: 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    label,
    .label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    input[type="search"],
    input[type="number"],
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      color: var(--ink);
      background: #fff;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(47, 111, 237, 0.22);
      border-color: var(--blue);
    }

    .pokemon-picker {
      position: relative;
    }

    .suggestions {
      position: absolute;
      z-index: 10;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      max-height: 260px;
      overflow: auto;
      display: none;
    }

    .suggestions.active {
      display: block;
    }

    .suggestions button {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      color: var(--ink);
    }

    .suggestions button:hover {
      background: #edf3ff;
    }

    .dex {
      color: var(--muted);
      font-size: 12px;
    }

    .selected {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #edf3ff;
      color: #183c84;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .iv-gauges {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .iv-gauge {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcff;
    }

    .iv-gauge-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .iv-gauge-head .label {
      margin: 0;
    }

    .iv-value {
      min-width: 34px;
      text-align: right;
      color: var(--blue);
      font-weight: 900;
      font-size: 18px;
    }

    .iv-control {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 8px;
      align-items: stretch;
    }

    .iv-zero,
    .iv-segment {
      border: 1px solid #cfd8ea;
      background: #fff;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .iv-zero {
      min-height: 34px;
      border-radius: 6px;
      color: var(--muted);
      font-weight: 800;
    }

    .iv-zero.active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .iv-bar {
      display: grid;
      grid-template-columns: repeat(5, minmax(8px, 1fr)) 8px repeat(5, minmax(8px, 1fr)) 8px repeat(5, minmax(8px, 1fr));
      gap: 3px;
      min-width: 0;
    }

    .iv-gap {
      pointer-events: none;
    }

    .iv-segment {
      min-height: 34px;
      border-radius: 3px;
      padding: 0;
    }

    .iv-segment.active {
      background: var(--blue);
      border-color: var(--blue);
    }

    .iv-segment:hover,
    .iv-zero:hover {
      transform: translateY(-1px);
      border-color: var(--blue);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      background: #eef2f8;
      border-radius: 8px;
      padding: 5px;
    }

    .segmented button {
      border: 0;
      min-height: 38px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-weight: 700;
    }

    .segmented button.active {
      color: #fff;
      background: var(--blue);
      box-shadow: 0 8px 18px rgba(47, 111, 237, 0.22);
    }

    .switchline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .switchline span {
      font-weight: 700;
      font-size: 14px;
    }

    .switchline input {
      width: 20px;
      height: 20px;
      accent-color: var(--blue);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tabs button {
      min-height: 40px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }

    .tabs button.active {
      border-color: var(--blue);
      color: var(--blue);
      background: #edf3ff;
    }

    .upload-box {
      border: 1px dashed #9aa8c0;
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      background: #fbfcff;
    }

    .upload-box strong {
      display: block;
      color: var(--ink);
      margin-bottom: 8px;
      text-align: center;
    }

    .file-action {
      display: block;
      width: 100%;
      min-height: 44px;
      border-radius: 6px;
      border: 1px solid var(--blue);
      color: var(--blue);
      background: #edf3ff;
      cursor: pointer;
      font-weight: 800;
      padding: 11px 12px;
      text-align: center;
      margin-top: 12px;
    }

    .file-action input {
      display: none;
    }

    .screenshot-preview {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2f8;
      margin-top: 12px;
      display: none;
    }

    .screenshot-preview.active {
      display: block;
    }

    .scan-status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .scan-result {
      display: none;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .scan-result.active {
      display: block;
    }

    .scan-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .scan-row:last-child {
      border-bottom: 0;
    }

    .scan-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 12px;
    }

    .scan-value {
      min-width: 0;
      font-weight: 800;
    }

    .scan-select {
      min-height: 38px;
      padding: 7px 9px;
    }

    .scan-name-search {
      width: 100%;
      min-height: 38px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: 1px solid var(--line);
      padding: 7px 9px;
    }

    .scan-iv-controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .scan-iv-controls input {
      min-height: 38px;
      padding: 7px 9px;
    }

    .scan-debug {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .scan-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
    }

    .secondary {
      min-height: 42px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
    }

    .secondary:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .primary {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(47, 111, 237, 0.24);
    }

    .primary:hover {
      background: #265dcc;
    }

    .result-card {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .score {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: #fbfcff;
    }

    .rankline {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .rank {
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 900;
      line-height: 1;
      color: var(--blue);
    }

    .rank-label {
      color: var(--muted);
      font-weight: 800;
    }

    .percent {
      margin-top: 12px;
      height: 12px;
      background: #e7edf6;
      border-radius: 999px;
      overflow: hidden;
    }

    .percent span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--yellow));
    }

    .subscore {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      min-height: 76px;
    }

    .stat b {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .stat span {
      font-weight: 900;
      font-size: 20px;
    }

    .family-results {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .family-results h3 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
      line-height: 1.3;
      background: #f3f6fb;
    }

    .family-list {
      display: grid;
    }

    .family-row {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) 76px 70px 70px 82px;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .family-row:last-child {
      border-bottom: 0;
    }

    .family-row.current {
      background: #fff7df;
      font-weight: 800;
    }

    .family-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .family-muted {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .family-value {
      text-align: right;
      white-space: nowrap;
    }

    .ranking {
      margin-top: 18px;
      overflow: hidden;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
      font-size: 14px;
    }

    th {
      background: #f3f6fb;
      color: var(--muted);
      font-size: 12px;
    }

    th:first-child,
    td:first-child,
    th:nth-child(2),
    td:nth-child(2) {
      text-align: left;
    }

    tr.highlight td {
      background: #fff7df;
      font-weight: 800;
    }

    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      color: var(--muted);
      background: #fbfcff;
      text-align: center;
    }

    .note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 880px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .updated {
        white-space: normal;
      }

      .grid,
      .result-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      main {
        padding-inline: 12px;
      }

      .panel-body,
      .panel-header {
        padding-inline: 14px;
      }

      .segmented {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .row,
      .stats,
      .family-row {
        grid-template-columns: 1fr;
      }

      .scan-actions,
      .scan-row,
      .scan-iv-controls {
        grid-template-columns: 1fr;
      }

      .family-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <h1>Pokemon GO 個体値ランクチェッカー</h1>
        </div>
        <div class="updated">手動入力MVP / PvP用ランキング対応</div>
      </div>
    </header>

    <main>
      <div class="grid">
        <section class="panel" aria-label="入力">
          <div class="panel-header">
            <h2>チェック条件</h2>
          </div>
          <div class="panel-body">
            <div class="field pokemon-picker">
              <label for="pokemonSearch">ポケモン名</label>
              <input id="pokemonSearch" type="search" autocomplete="off" placeholder="例: フシギバナ / venusaur">
              <div id="suggestions" class="suggestions"></div>
              <div id="selectedPokemon" class="selected"></div>
            </div>

            <div class="field">
              <div class="label">リーグ</div>
              <div class="segmented" id="leagueButtons"></div>
            </div>

            <div class="field">
              <label for="maxLevel">最大レベル</label>
              <select id="maxLevel">
                <option value="40">40</option>
                <option value="41">41</option>
                <option value="50" selected>50</option>
                <option value="51">51</option>
              </select>
            </div>

            <label class="switchline" for="minIvToggle">
              <span>個体値10以上のみ表示する</span>
              <input id="minIvToggle" type="checkbox">
            </label>

            <div class="tabs" role="tablist" aria-label="入力方法">
              <button id="manualTab" class="active" type="button">手動で入力</button>
              <button id="imageTab" type="button">スクショ入力</button>
            </div>

            <div id="manualInput">
              <div class="iv-gauges" id="ivGauges" aria-label="個体値ゲージ"></div>
              <div class="sr-only">
                <label for="atkIv">攻撃</label>
                <input id="atkIv" type="number" min="0" max="15" value="0">
                <label for="defIv">防御</label>
                <input id="defIv" type="number" min="0" max="15" value="15">
                <label for="staIv">HP</label>
                <input id="staIv" type="number" min="0" max="15" value="15">
              </div>
            </div>

            <div id="imageInput" class="hidden">
              <div class="upload-box">
                <strong>評価画面のスクショを読み取る</strong>
                <div class="note">ポケモンGOの評価画面で、ポケモン名と3本の個体値ゲージが写っている画像を選んでください。</div>
                <div class="field">
                  <label for="scanPattern">スクショパターン</label>
                  <select id="scanPattern">
                    <option value="auto" selected>自動判定</option>
                    <option value="pattern1">パターン1: 標準レイアウト</option>
                    <option value="pattern2">パターン2: 低めの評価パネル</option>
                    <option value="pattern3">パターン3: Galaxy S20</option>
                  </select>
                </div>
                <label class="file-action" for="screenshotFile">
                  スクショを選択
                  <input id="screenshotFile" type="file" accept="image/*">
                </label>
                <img id="screenshotPreview" class="screenshot-preview" alt="選択したスクリーンショットのプレビュー">
                <div id="scanStatus" class="scan-status">画像を選択すると解析を開始します。</div>
                <div id="scanResult" class="scan-result">
                  <div class="scan-row">
                    <div class="scan-label">ポケモン</div>
                    <div class="scan-value">
                      <input id="scanPokemonSearch" class="scan-name-search" type="search" placeholder="候補が違う場合は名前で検索">
                      <select id="scanPokemonSelect" class="scan-select"></select>
                    </div>
                  </div>
                  <div class="scan-row">
                    <div class="scan-label">個体値</div>
                    <div>
                      <div class="scan-iv-controls">
                        <label>攻撃<input id="scanAttackInput" type="number" min="0" max="15" value="0"></label>
                        <label>防御<input id="scanDefenseInput" type="number" min="0" max="15" value="0"></label>
                        <label>HP<input id="scanStaminaInput" type="number" min="0" max="15" value="0"></label>
                      </div>
                      <div id="scanDebug" class="scan-debug"></div>
                    </div>
                  </div>
                  <div class="scan-actions">
                    <button id="applyScanButton" class="primary" type="button">この内容で反映</button>
                    <button id="clearScanButton" class="secondary" type="button">やり直す</button>
                  </div>
                </div>
              </div>
            </div>

            <button id="calculateButton" class="primary" type="button">ランクを計算</button>
            <div class="note">CP制限リーグでは、制限CP以下で最もSCPが高くなるレベルを探索します。</div>
          </div>
        </section>

        <section>
          <div class="panel">
            <div class="panel-header">
              <h2>判定結果</h2>
            </div>
            <div class="panel-body">
              <div id="result"></div>
            </div>
          </div>

          <div class="panel ranking">
            <div class="panel-header">
              <h2 id="rankingTitle">対戦個体値ランキング</h2>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>順位</th>
                    <th>個体値</th>
                    <th>PL</th>
                    <th>CP</th>
                    <th>攻撃</th>
                    <th>防御</th>
                    <th>HP</th>
                    <th>SCP</th>
                    <th>理想比</th>
                  </tr>
                </thead>
                <tbody id="rankingBody"></tbody>
              </table>
            </div>
          </div>
        </section>

    function clampIv(value) {
      const number = Number(value);
      if (Number.isNaN(number)) return 0;
      return Math.min(15, Math.max(0, Math.trunc(number)));
    }

    function cpFor(pokemon, ivs, level) {
      const cpm = CP_MULTIPLIERS[level];
      const attack = pokemon.attack + ivs.attack;
      const defense = pokemon.defense + ivs.defense;
      const stamina = pokemon.stamina + ivs.stamina;
      return Math.max(10, Math.floor((attack * Math.sqrt(defense) * Math.sqrt(stamina) * cpm * cpm) / 10));
    }

    function statsFor(pokemon, ivs, level) {
      const cpm = CP_MULTIPLIERS[level];
      const attack = (pokemon.attack + ivs.attack) * cpm;
      const defense = (pokemon.defense + ivs.defense) * cpm;
      const hp = Math.floor((pokemon.stamina + ivs.stamina) * cpm);
      const cp = cpFor(pokemon, ivs, level);
      return {
        attack,
        defense,
        hp,
        cp,
        statProduct: attack * defense * hp
      };
    }

    function levelsUpTo(maxLevel) {
      const levels = [];
      for (let level = 1; level <= maxLevel; level += 0.5) {
        levels.push(level);
      }
      return levels;
    }

    function bestBuildForIvs(pokemon, ivs, league, maxLevel) {
      const limit = LEAGUES[league].limit;
      let best = null;
      for (const level of levelsUpTo(maxLevel)) {
        const stats = statsFor(pokemon, ivs, level);
        if (stats.cp <= limit) {
          if (!best || stats.statProduct > best.statProduct) {
            best = { ...stats, level, ivs };
          }
        }
      }
      return best;
    }

    function rankPokemon(pokemon, league, maxLevel, minIv) {
      const cacheKey = `${pokemon.sourceId || pokemon.id}:${league}:${maxLevel}:${minIv}`;
      if (state.rankCache.has(cacheKey)) return state.rankCache.get(cacheKey);

      const rows = [];
      for (let attack = minIv; attack <= 15; attack += 1) {
        for (let defense = minIv; defense <= 15; defense += 1) {
          for (let stamina = minIv; stamina <= 15; stamina += 1) {
            const build = bestBuildForIvs(pokemon, { attack, defense, stamina }, league, maxLevel);
            if (build) rows.push(build);
          }
        }
      }

      rows.sort((a, b) => {
        if (b.statProduct !== a.statProduct) return b.statProduct - a.statProduct;
        if (b.cp !== a.cp) return b.cp - a.cp;
        if (a.ivs.attack !== b.ivs.attack) return a.ivs.attack - b.ivs.attack;
        if (b.ivs.defense !== a.ivs.defense) return b.ivs.defense - a.ivs.defense;
        return b.ivs.stamina - a.ivs.stamina;
      });

      const top = rows[0]?.statProduct || 1;
      const rankedRows = rows.map((row, index) => ({
        ...row,
        rank: index + 1,
        percent: (row.statProduct / top) * 100
      }));
      state.rankCache.set(cacheKey, rankedRows);
      return rankedRows;
    }

    function ivKey(ivs) {

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        const image = new Image();
        image.onload = () => {
          resolve(image);
        };
        image.onerror = () => {
          reject(new Error("画像を読み込めませんでした。"));
        };
        reader.onload = () => {
          image.src = reader.result;
        };
        reader.onerror = () => reject(new Error("画像を読み込めませんでした。"));
        reader.readAsDataURL(file);
      });
    }

    function imageToCanvas(image, maxWidth = 900) {
      const scale = Math.min(1, maxWidth / image.naturalWidth);
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(image.naturalWidth * scale);
      canvas.height = Math.round(image.naturalHeight * scale);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      return canvas;
    }

    function isAppraisalBarPixel(r, g, b) {
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const saturation = max === 0 ? 0 : (max - min) / max;
      return r > 145 && g > 65 && g < 215 && b < 135 && r > b * 1.35 && g > b * 1.22 && saturation > 0.32;
    }

    function isAppraisalRedPixel(r, g, b) {
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const saturation = max === 0 ? 0 : (max - min) / max;
      return r > 175 && r < 245 && g > 80 && g < 165 && b > 80 && b < 175 && Math.abs(g - b) < 35 && r > g * 1.18 && saturation > 0.22;
    }

    function isAppraisalFilledPixel(r, g, b, pattern) {
      return isAppraisalBarPixel(r, g, b) || isAppraisalRedPixel(r, g, b);
    }

    function isAppraisalTrackPixel(r, g, b, pattern) {
      const grayTrack = r > 175 && r < 235 && g > 175 && g < 235 && b > 165 && b < 230 && Math.max(r, g, b) - Math.min(r, g, b) < 35;
      return isAppraisalFilledPixel(r, g, b, pattern) || grayTrack;
    }

    function median(values) {
      if (!values.length) return 0;
      const sorted = [...values].sort((a, b) => a - b);
      return sorted[Math.floor(sorted.length / 2)];
    }

    function colorBoundsForBand(imageData, width, height, centerY, bandHeight, pattern) {
      const top = Math.max(0, Math.round(centerY - bandHeight));
      const bottom = Math.min(height - 1, Math.round(centerY + bandHeight));
      const leftLimit = Math.round(width * 0.07);
      const rightLimit = Math.round(width * 0.58);
      let minX = width;
      let maxX = 0;
      let count = 0;

      for (let y = top; y <= bottom; y += 1) {
        for (let x = leftLimit; x <= rightLimit; x += 1) {
          const index = (y * width + x) * 4;
          if (isAppraisalFilledPixel(imageData.data[index], imageData.data[index + 1], imageData.data[index + 2], pattern)) {
            minX = Math.min(minX, x);
            maxX = Math.max(maxX, x);
            count += 1;
          }
        }
      }

      return count ? { minX, maxX, width: maxX - minX + 1, count } : null;
    }

    function columnGroups(scores, threshold, minWidth) {
      const groups = [];
      let current = null;
      scores.forEach(({ x, score }) => {
        if (score >= threshold) {
          if (!current) current = { start: x, end: x, maxScore: score };
          current.end = x;
          current.maxScore = Math.max(current.maxScore, score);
        } else if (current) {
          if (current.end - current.start + 1 >= minWidth) groups.push(current);
          current = null;
        }
      });
      if (current && current.end - current.start + 1 >= minWidth) groups.push(current);
      return groups;
    }

    function appraisalBlockRanges(imageData, width, height, centers, pattern) {
      const leftLimit = Math.round(width * 0.07);
      const rightLimit = Math.round(width * 0.58);
      const bandHalfHeight = Math.max(6, Math.round(height * 0.0045));
      const scores = [];
      for (let x = leftLimit; x <= rightLimit; x += 1) {
        let score = 0;
        centers.forEach((center) => {
          for (let y = Math.round(center - bandHalfHeight); y <= Math.round(center + bandHalfHeight); y += 1) {
            if (y < 0 || y >= height) continue;
            const index = (y * width + x) * 4;
            if (isAppraisalTrackPixel(imageData.data[index], imageData.data[index + 1], imageData.data[index + 2], pattern)) score += 1;
          }
        });
        scores.push({ x, score });
      }
      let groups = columnGroups(scores, Math.max(5, centers.length * 2), Math.max(12, width * 0.012));
      if (groups.length > 3) {
        const merged = [];
        groups.forEach((group) => {
          const previous = merged[merged.length - 1];
          if (previous && group.start - previous.end <= Math.max(3, width * 0.006)) {
            previous.end = group.end;
            previous.maxScore = Math.max(previous.maxScore, group.maxScore);
          } else {
            merged.push({ ...group });
          }
        });
        groups = merged;
      }
      const normalized = normalizeAppraisalBlocks(groups);
      return normalized.length >= 3 ? normalized.slice(0, 3) : [];
    }

    function normalizeAppraisalBlocks(groups) {
      const blocks = groups.map((group) => ({ ...group })).sort((a, b) => a.start - b.start);
      if (blocks.length < 2) return blocks;
      const widths = blocks.map((block) => block.end - block.start + 1).sort((a, b) => a - b);
      const targetWidth = widths[Math.floor(widths.length / 2)];
      const normalized = [];
      blocks.forEach((block) => {
        const blockWidth = block.end - block.start + 1;
        if (targetWidth > 0 && blockWidth > targetWidth * 1.55 && normalized.length < 2) {
          const gap = Math.max(4, Math.round(targetWidth * 0.06));
          normalized.push({ ...block, end: block.start + targetWidth - 1 });
          normalized.push({ ...block, start: block.start + targetWidth + gap, end: block.start + targetWidth * 2 + gap - 1 });
        } else {
          normalized.push(block);
        }
      });
      return normalized.sort((a, b) => a.start - b.start);
    }

    function scoreGaugeCenters(imageData, width, height, centers, pattern) {
      if (centers.length !== 3) return null;
      const gaps = [centers[1] - centers[0], centers[2] - centers[1]];
      const averageGap = (gaps[0] + gaps[1]) / 2;
      if (averageGap < height * 0.025 || averageGap > height * 0.08) return null;
      const gapBalance = Math.abs(gaps[0] - gaps[1]) / averageGap;
      if (gapBalance > 0.35) return null;
      const blocks = appraisalBlockRanges(imageData, width, height, centers, pattern);
      if (blocks.length !== 3) return null;
      const totalWidth = blocks.reduce((sum, block) => sum + block.end - block.start + 1, 0);
      return { centers, blocks, score: totalWidth - gapBalance * 1000 };
    }

    function inferGalaxyBlocksFromGroups(groups, width) {
      const left = Math.round(median(groups.map((group) => group.bounds.minX)));
      const widths = groups.map((group) => group.bounds.width).sort((a, b) => a - b);
      const totalWidth = Math.round(widths[Math.floor(widths.length / 2)]);
      const safeWidth = Math.max(Math.round(width * 0.22), Math.min(totalWidth, Math.round(width * 0.42)));
      const gap = Math.max(3, Math.round(safeWidth * 0.025));
      const blockWidth = Math.max(12, Math.round((safeWidth - gap * 2) / 3));
      return [0, 1, 2].map((index) => ({
        start: left + index * (blockWidth + gap),
        end: left + index * (blockWidth + gap) + blockWidth - 1
      }));
    }

    function chooseGalaxyGaugeLayout(imageData, width, height, groups, pattern) {
      const candidates = groups
        .filter((group) => group.center >= height * 0.62)
        .filter((group) => group.bounds.width >= width * 0.18 && group.bounds.width <= width * 0.44)
        .sort((a, b) => a.center - b.center);
      let best = null;

      for (let a = 0; a < candidates.length - 2; a += 1) {
        for (let b = a + 1; b < candidates.length - 1; b += 1) {
          for (let c = b + 1; c < candidates.length; c += 1) {
            const selectedGroups = [candidates[a], candidates[b], candidates[c]];
            const centers = selectedGroups.map((group) => group.center);
            const gaps = [centers[1] - centers[0], centers[2] - centers[1]];
            const averageGap = (gaps[0] + gaps[1]) / 2;
            if (averageGap < height * 0.025 || averageGap > height * 0.075) continue;
            const gapBalance = Math.abs(gaps[0] - gaps[1]) / averageGap;
            if (gapBalance > 0.42) continue;

            const groupWidths = selectedGroups.map((group) => group.bounds.width);
            const widthMedian = median(groupWidths);
            const widthBalance = Math.max(...groupWidths.map((groupWidth) => Math.abs(groupWidth - widthMedian) / Math.max(1, widthMedian)));
            const inferredBlocks = inferGalaxyBlocksFromGroups(selectedGroups, width);
            const detectedBlocks = appraisalBlockRanges(imageData, width, height, centers, pattern);
            const blocks = detectedBlocks.length === 3 ? detectedBlocks : inferredBlocks;
            const blockQualityBonus = detectedBlocks.length === 3 ? 0 : -80;
            const score = 1000 - gapBalance * 620 - widthBalance * 190 + blockQualityBonus - Math.abs(averageGap - height * 0.043) * 1.1;

            if (!best || score > best.score) {
              best = {
                centers,
                blocks,
                score,
                method: detectedBlocks.length === 3 ? "detected-blocks" : "inferred-blocks",
                selectedGroups,
                gapBalance,
                widthBalance
              };
            }
          }
        }
      }

      return best;
    }

    function chooseGaugeLayout(imageData, width, height, groups, pattern) {
      if (pattern === "pattern3") return chooseGalaxyGaugeLayout(imageData, width, height, groups, pattern);
      const centers = groups.map((group) => group.center).sort((a, b) => a - b);
      let best = null;
      for (let index = 0; index <= centers.length - 3; index += 1) {
        const candidate = scoreGaugeCenters(imageData, width, height, centers.slice(index, index + 3), pattern);
        if (candidate && (!best || candidate.score > best.score)) best = candidate;
      }
      return best;
    }

    function detectIvBarsByBlocks(imageData, width, height, centers, blocks, pattern) {
      const bandHalfHeight = Math.max(6, Math.round(height * 0.0045));
      const filledColumnThreshold = pattern === "pattern3" ? 0.42 : 0.18;
      const rowDebug = [];
      const values = centers.map((center) => {
        let redHits = 0;
        let redSamples = 0;
        const total = blocks.reduce((sum, block) => {
          let rightMostOrange = null;
          for (let x = block.start; x <= block.end; x += 1) {
            let orangeHits = 0;
            let samples = 0;
            for (let y = Math.round(center - bandHalfHeight); y <= Math.round(center + bandHalfHeight); y += 1) {
              if (y < 0 || y >= height) continue;
              const index = (y * width + x) * 4;
              if (pattern === "pattern3") {
                redSamples += 1;
                if (isAppraisalRedPixel(imageData.data[index], imageData.data[index + 1], imageData.data[index + 2])) redHits += 1;
              }
              if (isAppraisalFilledPixel(imageData.data[index], imageData.data[index + 1], imageData.data[index + 2], pattern)) orangeHits += 1;
              samples += 1;
            }
            if (samples && orangeHits / samples > filledColumnThreshold) rightMostOrange = x;
          }
          if (rightMostOrange === null) return sum;
          const fraction = Math.max(0, Math.min(1, (rightMostOrange - block.start + 1) / (block.end - block.start + 1)));
          return sum + Math.max(0, Math.min(5, Math.round(fraction * 5)));
        }, 0);
        const redRatio = redSamples ? redHits / redSamples : 0;
        const corrected = pattern === "pattern3" && total >= 15 && redRatio < 0.08 ? 14 : total;
        rowDebug.push(`y${Math.round(center)} red=${redRatio.toFixed(2)} ${total}->${corrected}`);
        return corrected;
      });
      return {
        values,
        debug: `bars: y=${centers.map((center) => Math.round(center)).join("/")}, x=${blocks.map((block) => `${block.start}-${block.end}`).join(" ")}, fill>${filledColumnThreshold}${rowDebug.length ? `, ${rowDebug.join(", ")}` : ""}`
      };
    }

    function formatGroupsForDebug(groups) {
      if (!groups.length) return "none";
      return groups.slice(0, 8).map((group) => {
        const y = group.center ? Math.round(group.center) : `${group.start}-${group.end}`;
        const widthText = group.bounds ? `w${group.bounds.width}` : "w-";
        const maxText = typeof group.maxScore === "number" ? `max${Math.round(group.maxScore)}` : "max-";
        return `y${y}/${widthText}/${maxText}`;
      }).join(", ");
    }

    function formatBlocksForDebug(blocks) {
      if (!blocks || !blocks.length) return "none";
      return blocks.map((block) => `${block.start}-${block.end}`).join(", ");
    }

    function detectIvBarsForPattern(canvas, pattern) {
      const context = canvas.getContext("2d", { willReadFrequently: true });
      const width = canvas.width;
      const height = canvas.height;
      const imageData = context.getImageData(0, 0, width, height);
      const rowScores = [];
      const leftLimit = Math.round(width * 0.08);
      const rightLimit = Math.round(width * 0.52);
      const topLimit = Math.round(height * 0.38);
      const bottomLimit = Math.round(height * 0.94);
      let peakRow = { y: topLimit, score: 0 };

      for (let y = topLimit; y <= bottomLimit; y += 1) {
        let score = 0;
        for (let x = leftLimit; x <= rightLimit; x += 1) {
          const index = (y * width + x) * 4;
          if (isAppraisalFilledPixel(imageData.data[index], imageData.data[index + 1], imageData.data[index + 2], pattern)) {
            score += 1;
          }
        }
        if (score > peakRow.score) peakRow = { y, score };
        rowScores.push({ y, score });
      }

      const threshold = Math.max(16, width * 0.055);
      const rawGroups = [];
      let current = null;
      rowScores.forEach(({ y, score }) => {
        if (score >= threshold) {
          if (!current) current = { start: y, end: y, maxScore: score };
          current.end = y;
          current.maxScore = Math.max(current.maxScore, score);
        } else if (current) {
          rawGroups.push(current);
          current = null;
        }
      });
      if (current) rawGroups.push(current);

      const merged = [];
      rawGroups.forEach((group) => {
        const previous = merged[merged.length - 1];
        if (previous && group.start - previous.end <= Math.max(8, height * 0.01)) {
          previous.end = group.end;
          previous.maxScore = Math.max(previous.maxScore, group.maxScore);
        } else {
          merged.push({ ...group });
        }
      });

      const groups = merged.map((group) => {
        const center = (group.start + group.end) / 2;
        const bounds = colorBoundsForBand(imageData, width, height, center, Math.max(6, (group.end - group.start) / 2 + 4), pattern);
        return { ...group, center, bounds };
      }).filter((group) => group.bounds && group.bounds.width > width * 0.08);

      const layout = chooseGaugeLayout(imageData, width, height, groups, pattern);
      const debugBase = [
        `${pattern}`,
        `image ${width}x${height}`,
        `scan x${leftLimit}-${rightLimit} y${topLimit}-${bottomLimit}`,
        `threshold ${Math.round(threshold)} peak y${peakRow.y}/${peakRow.score}`,
        `rowGroups raw ${rawGroups.length}, merged ${merged.length}, usable ${groups.length}`,
        `usable: ${formatGroupsForDebug(groups)}`
      ];
      if (!layout) {
        return {
          success: false,
          message: "個体値ゲージを3本見つけられませんでした。評価画面全体が写ったスクショで試してください。",
          debug: debugBase.join("\n")
        };
      }

      const blockResult = detectIvBarsByBlocks(imageData, width, height, layout.centers, layout.blocks, pattern);
      return {
        success: true,
        values: { attack: blockResult.values[0], defense: blockResult.values[1], stamina: blockResult.values[2] },
        debug: [
          ...debugBase,
          `selected y=${layout.centers.map((center) => Math.round(center)).join("/")}`,
          layout.method ? `layout ${layout.method} score ${Math.round(layout.score)}` : "",
          layout.selectedGroups ? `selected groups: ${formatGroupsForDebug(layout.selectedGroups)}` : "",
          `blocks ${formatBlocksForDebug(layout.blocks)}`,
          blockResult.debug
        ].filter(Boolean).join("\n"),
        message: `ゲージ推定: 攻撃${blockResult.values[0]} / 防御${blockResult.values[1]} / HP${blockResult.values[2]}`
      };
    }

    function detectIvBars(canvas, selectedPattern = "auto") {
      const patterns = selectedPattern === "auto" ? ["pattern1", "pattern2", "pattern3"] : [selectedPattern];
      const results = patterns.map((pattern) => detectIvBarsForPattern(canvas, pattern));
      const successful = results.find((result) => result.success);
      if (successful) {
        return {
          ...successful,
          debug: selectedPattern === "auto"
            ? results.map((result) => `${result.success ? "OK" : "NG"}\n${result.debug || ""}`).join("\n\n")
            : successful.debug
        };
      }
      return {
        ...(results[0] || { success: false, message: "個体値ゲージを3本見つけられませんでした。" }),
        debug: results.map((result) => `NG\n${result.debug || ""}`).join("\n\n")
      };
    }

    function normalizeNameText(value) {
      return value
        .toLowerCase()
        .replace(/[\s\n\r\t。、・･'’"“”()（）\[\]【】_\-—ー]/g, "")
        .replace(/[0-9]/g, "");
    }

    function foldKanaForMatching(value) {
      return value
        .replace(/[ガカ]/g, "カ")
        .replace(/[ギキ]/g, "キ")
        .replace(/[グク]/g, "ク")
        .replace(/[ゲケ]/g, "ケ")
        .replace(/[ゴコ]/g, "コ")
        .replace(/[ザサ]/g, "サ")
        .replace(/[ジシ]/g, "シ")
        .replace(/[ズス]/g, "ス")
        .replace(/[ゼセ]/g, "セ")
        .replace(/[ゾソ]/g, "ソ")
        .replace(/[ダタ]/g, "タ")
        .replace(/[ヂチ]/g, "チ")
        .replace(/[ヅツ]/g, "ツ")
        .replace(/[デテ]/g, "テ")
        .replace(/[ドト]/g, "ト")
        .replace(/[バパハ]/g, "ハ")
        .replace(/[ビピヒ]/g, "ヒ")
        .replace(/[ブプフ]/g, "フ")
        .replace(/[ベペヘ]/g, "ヘ")
        .replace(/[ボポホ]/g, "ホ");
    }

    function levenshtein(a, b) {
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i += 1) dp[i][0] = i;
      for (let j = 0; j <= b.length; j += 1) dp[0][j] = j;
      for (let i = 1; i <= a.length; i += 1) {
        for (let j = 1; j <= b.length; j += 1) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
        }
      }
      return dp[a.length][b.length];
    }

    function bestSubstringDistance(text, name) {
      if (!text || !name) return 999;
      if (text.includes(name)) return 0;
      const minLength = Math.max(1, name.length - 2);
      const maxLength = Math.min(text.length, name.length + 2);
      let best = levenshtein(text, name);
      for (let length = minLength; length <= maxLength; length += 1) {
        for (let start = 0; start <= text.length - length; start += 1) {
          best = Math.min(best, levenshtein(text.slice(start, start + length), name));
          if (best === 0) return 0;
        }
      }
      return best;
    }

    function bestNameDistance(text, name) {
      return Math.min(
        bestSubstringDistance(text, name),
        bestSubstringDistance(foldKanaForMatching(text), foldKanaForMatching(name)) + 0.15
      );
    }

    function scorePokemonNameCandidates(text) {
      const normalizedText = normalizeNameText(text);
      if (!normalizedText) return [];

      return POKEMON.map((pokemon) => {
        const names = [pokemon.name, pokemon.en].map(normalizeNameText);
        const bestScore = Math.min(...names.map((name) => {
          if (!name) return 999;
          const shortNamePenalty = normalizedText.length >= 6 && name.length <= 3 ? 3 : 0;
          if (normalizedText.includes(name)) return shortNamePenalty;
          if (name.includes(normalizedText)) return 1;
          const distance = bestNameDistance(normalizedText, name);
          return (distance / Math.max(1, name.length)) + shortNamePenalty + Math.max(0, 6 - name.length) * 0.08;
        }));
        return { pokemon, score: bestScore };
      }).sort((a, b) => a.score - b.score || a.pokemon.id - b.pokemon.id);
    }

    function findPokemonCandidates(text) {
      const scored = scorePokemonNameCandidates(text);
      if (!scored.length) return [state.pokemon];

      return scored.slice(0, 5).map((item) => item.pokemon);
    }

    function findPokemonCandidatesFromTexts(texts) {
      const groups = texts
        .map((entry) => typeof entry === "string" ? { text: entry, weight: 1 } : entry)
        .filter((entry) => entry.text && entry.text.trim());
      const scoredLists = groups
        .map((entry) => ({
          weight: entry.weight || 1,
          items: scorePokemonNameCandidates(entry.text).slice(0, 24)
        }))
        .filter((entry) => entry.items.length);
      if (!scoredLists.length) return [state.pokemon];

      const candidateKeys = new Map();
      scoredLists.forEach(({ items }) => {
        items.forEach(({ pokemon }) => {
          const key = pokemon.sourceId || `${pokemon.id}:${pokemon.name}`;
          if (!candidateKeys.has(key)) candidateKeys.set(key, pokemon);
        });
      });

      const totals = [];
      candidateKeys.forEach((pokemon, key) => {
        const score = scoredLists.reduce((sum, { weight, items }) => {
          const foundIndex = items.findIndex((item) => (item.pokemon.sourceId || `${item.pokemon.id}:${item.pokemon.name}`) === key);
          if (foundIndex === -1) return sum + 0.75 * weight;
          return sum + (items[foundIndex].score + foundIndex * 0.02) * weight;
        }, 0);
        const bestScore = Math.min(...scoredLists.map(({ items }) => {
          const found = items.find((item) => (item.pokemon.sourceId || `${item.pokemon.id}:${item.pokemon.name}`) === key);
          return found ? found.score : 999;
        }));
        totals.push({ pokemon, score, bestScore });
      });

      return totals
        .sort((a, b) => a.score - b.score || a.bestScore - b.bestScore || a.pokemon.id - b.pokemon.id)
        .slice(0, 5)
        .map((item) => item.pokemon);
    }

    function pokemonSearchCandidates(query) {
      const normalizedQuery = normalizeNameText(query);
      if (!normalizedQuery) return [state.pokemon];
      const exact = [];
      const partial = [];
      const fuzzy = [];
      POKEMON.forEach((pokemon) => {
        const names = [pokemon.name, pokemon.en].map(normalizeNameText);
        if (names.some((name) => name === normalizedQuery)) exact.push(pokemon);
        else if (names.some((name) => name.includes(normalizedQuery) || normalizedQuery.includes(name))) partial.push(pokemon);
        else {
          const score = Math.min(...names.map((name) => levenshtein(normalizedQuery, name)));
          if (score <= Math.max(1, Math.floor(normalizedQuery.length * 0.35))) fuzzy.push({ pokemon, score });
        }
      });
      return [...exact, ...partial, ...fuzzy.sort((a, b) => a.score - b.score).map((item) => item.pokemon)].slice(0, 20);
    }

    function populateScanPokemonOptions(candidates) {
      elements.scanPokemonSelect.innerHTML = "";
      const unique = [];
      const seen = new Set();
      candidates.forEach((pokemon) => {
        const key = pokemon.sourceId || `${pokemon.id}:${pokemon.name}`;
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(pokemon);
        }
      });
      unique.forEach((pokemon) => {
        const option = document.createElement("option");
        option.value = pokemon.sourceId || `${pokemon.id}:${pokemon.name}`;
        option.textContent = `No.${pokemon.id} ${pokemon.name}`;
        elements.scanPokemonSelect.appendChild(option);
      });
    }

    function cropAreaForOcr(canvas, sourceXRatio, sourceYRatio, sourceWidthRatio, sourceHeightRatio) {
      const crop = document.createElement("canvas");
      const sourceX = Math.round(canvas.width * sourceXRatio);
      const sourceY = Math.round(canvas.height * sourceYRatio);
      const sourceWidth = Math.round(canvas.width * sourceWidthRatio);
      const sourceHeight = Math.round(canvas.height * sourceHeightRatio);
      const scale = 3;
      crop.width = sourceWidth * scale;
      crop.height = sourceHeight * scale;
      const context = crop.getContext("2d");
      context.drawImage(
        canvas,
        sourceX,
        sourceY,
        sourceWidth,
        sourceHeight,
        0,
        0,
        crop.width,
        crop.height
      );
      const imageData = context.getImageData(0, 0, crop.width, crop.height);
      for (let index = 0; index < imageData.data.length; index += 4) {
        const r = imageData.data[index];
        const g = imageData.data[index + 1];
        const b = imageData.data[index + 2];
        const darkText = g < 150 && r < 145 && b < 150 && Math.abs(g - r) < 70;
        const value = darkText ? 0 : 255;
        imageData.data[index] = value;
        imageData.data[index + 1] = value;
        imageData.data[index + 2] = value;
      }
      context.putImageData(imageData, 0, 0);
      return crop;
    }

    function cropNameArea(canvas) {
      return cropAreaForOcr(canvas, 0.14, 0.32, 0.72, 0.14);
    }

    function cropCatchTextArea(canvas) {
      return cropAreaForOcr(canvas, 0.02, 0.83, 0.96, 0.13);
    }

    async function recognizePokemonName(canvas) {
      if (!window.Tesseract) {
        return { text: "", candidates: [state.pokemon], message: "OCRライブラリを読み込めませんでした。ポケモン名は手動で確認してください。" };
      }

      const recognize = (targetCanvas, label) => Tesseract.recognize(targetCanvas, "jpn+eng", {
        tessedit_pageseg_mode: "6",
        preserve_interword_spaces: "1",
        logger: (event) => {
          if (event.status === "recognizing text") {
            setScanStatus(`${label}をOCR解析中... ${Math.round(event.progress * 100)}%`);
          }
        }
      });

      const nameResult = await recognize(cropNameArea(canvas), "名前欄");
      const catchTextResult = await recognize(cropCatchTextArea(canvas), "捕獲説明");
      const nameText = nameResult.data.text || "";
      const catchText = catchTextResult.data.text || "";
      const text = [nameText, catchText].filter((value) => value.trim()).join("\n");
      return {
        text,
        candidates: findPokemonCandidatesFromTexts([
          { text: nameText, weight: 1 },
          { text: catchText, weight: 1.25 }
        ]),
        message: text.trim() ? `OCR候補: ${text.trim().replace(/\\s+/g, " ")}` : "ポケモン名を読み取れませんでした。候補を確認してください。"
      };
    }

    function renderScanResult(ivResult, nameResult) {
      const values = ivResult.success ? ivResult.values : { attack: "", defense: "", stamina: "" };
      elements.scanAttackInput.value = values.attack === "" ? 0 : values.attack;
      elements.scanDefenseInput.value = values.defense === "" ? 0 : values.defense;
      elements.scanStaminaInput.value = values.stamina === "" ? 0 : values.stamina;
      elements.scanDebug.textContent = ivResult.debug || "";
      elements.applyScanButton.dataset.attack = values.attack;
      elements.applyScanButton.dataset.defense = values.defense;
      elements.applyScanButton.dataset.stamina = values.stamina;

      const candidates = nameResult.candidates?.length ? nameResult.candidates : [state.pokemon];
      populateScanPokemonOptions(candidates);
      elements.scanResult.classList.add("active");
    }

    async function handleScreenshotFile(file) {
      resetScanResult();
      setScanStatus("画像を読み込んでいます...");
      const image = await loadImageFromFile(file);
      elements.screenshotPreview.src = image.src;
      elements.screenshotPreview.classList.add("active");
      const canvas = imageToCanvas(image);

      setScanStatus("個体値ゲージを解析しています...");
      const ivResult = detectIvBars(canvas, elements.scanPattern.value);
      ivResult.debug = [
        `source ${image.naturalWidth}x${image.naturalHeight} -> canvas ${canvas.width}x${canvas.height}`,
        ivResult.debug || ""
      ].filter(Boolean).join("\n");
      setScanStatus(ivResult.message);

      let nameResult = { candidates: [state.pokemon], message: "" };
      try {
        setScanStatus(`${ivResult.message} / ポケモン名をOCR解析しています...`);
        nameResult = await recognizePokemonName(canvas);
      } catch (error) {
        nameResult = {
          candidates: [state.pokemon],
          message: "OCR解析に失敗しました。ポケモン名は現在の選択を使うか、手動で変更してください。"
        };
      }

      renderScanResult(ivResult, nameResult);
      setScanStatus(`${ivResult.message} / ${nameResult.message}`);
    }

    function applyScanResult() {
      const selectedSourceId = elements.scanPokemonSelect.value;
      const pokemon = POKEMON.find((candidate) => (candidate.sourceId || `${candidate.id}:${candidate.name}`) === selectedSourceId);
      if (pokemon) setPokemon(pokemon);

      const attack = elements.applyScanButton.dataset.attack;
      const defense = elements.applyScanButton.dataset.defense;
      const stamina = elements.applyScanButton.dataset.stamina;
      elements.atkIv.value = clampIv(elements.scanAttackInput.value || attack);
      elements.defIv.value = clampIv(elements.scanDefenseInput.value || defense);
      elements.staIv.value = clampIv(elements.scanStaminaInput.value || stamina);
      calculate();
      elements.manualTab.click();
    }

    function renderSuggestions() {
      const query = elements.search.value.trim().toLowerCase();
      elements.suggestions.innerHTML = "";
      if (!query) {
        elements.suggestions.classList.remove("active");
        return;
      }

      const matches = POKEMON.filter((pokemon) => {
        return pokemon.name.includes(query) ||
          pokemon.en.includes(query) ||
          String(pokemon.id) === query;
      }).slice(0, 12);

      matches.forEach((pokemon) => {
        const button = document.createElement("button");
        button.type = "button";
        button.innerHTML = `<span>${pokemon.name}<span class="dex"> / ${pokemon.en}</span></span><span class="dex">No.${pokemon.id}</span>`;
        button.addEventListener("click", () => setPokemon(pokemon));
        elements.suggestions.appendChild(button);
      });

      elements.suggestions.classList.toggle("active", matches.length > 0);
    }

    function renderResult(selected) {
      if (!selected) {
        elements.result.innerHTML = '<div class="empty">この条件ではCP制限内の候補がありません。</div>';
        return;
      }

      const diff = typeof selected.rank === "number" ? `${selected.rank - 1}ランク` : "ランキング対象外";
      const familyResults = buildFamilyResults();
      elements.result.innerHTML = `
        <div class="result-card">
          <div class="score">
            <div class="rankline">
              <div class="rank">${selected.rank}</div>
              <div class="rank-label">位 / ${state.rankings.length}通り</div>
            </div>
            <div class="percent" aria-hidden="true"><span style="width:${selected.percent}%"></span></div>
            <div class="subscore">理想比 ${formatNumber(selected.percent, 2)}% / TOPとの差 ${diff}</div>
          </div>
          <div class="stats">
            <div class="stat"><b>個体値</b><span>${ivKey(selected.ivs)}</span></div>
            <div class="stat"><b>最適PL</b><span>${selected.level}</span></div>
            <div class="stat"><b>最終CP</b><span>${selected.cp}</span></div>
            <div class="stat"><b>SCP</b><span>${Math.round(selected.statProduct).toLocaleString("ja-JP")}</span></div>
            <div class="stat"><b>攻撃実数値</b><span>${formatNumber(selected.attack)}</span></div>
            <div class="stat"><b>防御 / HP</b><span>${formatNumber(selected.defense)} / ${selected.hp}</span></div>
          </div>
        </div>
        ${renderFamilyResults(familyResults)}
      `;

    function getFamilyPokemon() {
      return POKEMON.filter((pokemon) => pokemon.family === state.pokemon.family)
        .sort((a, b) => a.id - b.id || a.name.localeCompare(b.name, "ja"));
    }

    function selectedBuildForPokemon(pokemon) {
      const rankings = rankPokemon(pokemon, state.league, state.maxLevel, state.minIv);
      const selected = rankings.find((row) => ivKey(row.ivs) === ivKey(state.input));
      if (selected) return { selected, total: rankings.length };

      const outOfFilterBuild = bestBuildForIvs(pokemon, state.input, state.league, state.maxLevel);
      if (!outOfFilterBuild) return { selected: null, total: rankings.length };
      return {
        selected: {
          ...outOfFilterBuild,
          rank: "-",
          percent: (outOfFilterBuild.statProduct / (rankings[0]?.statProduct || outOfFilterBuild.statProduct)) * 100
        },
        total: rankings.length
      };
    }

    function buildFamilyResults() {
      return getFamilyPokemon().map((pokemon) => {
        const result = selectedBuildForPokemon(pokemon);
        return { pokemon, ...result };
      });
    }

    function renderFamilyResults(results) {
      if (results.length <= 1) return "";
      return `
        <div class="family-results">
          <h3>進化系での順位</h3>
          <div class="family-list">
            ${results.map(({ pokemon, selected, total }) => {
              const isCurrent = pokemon.sourceId === state.pokemon.sourceId;
              if (!selected) {
                return `
                  <div class="family-row ${isCurrent ? "current" : ""}">
                    <div class="family-name">${pokemon.name}<div class="family-muted">No.${pokemon.id}</div></div>
                    <div class="family-value">対象外</div>
                    <div class="family-value">-</div>
                    <div class="family-value">-</div>
                    <div class="family-value">-</div>
                  </div>
                `;
              }
              const rankText = typeof selected.rank === "number" ? `${selected.rank}位` : "-";
              const totalText = typeof selected.rank === "number" ? `/${total}通り` : "対象外";
              return `
                <div class="family-row ${isCurrent ? "current" : ""}">
                  <div class="family-name">${pokemon.name}<div class="family-muted">No.${pokemon.id} ${pokemon.en}</div></div>
                  <div class="family-value">${rankText}<div class="family-muted">${totalText}</div></div>
                  <div class="family-value">PL ${selected.level}</div>
                  <div class="family-value">CP ${selected.cp}</div>
                  <div class="family-value">${formatNumber(selected.percent, 2)}%</div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderRanking(selected) {
      const league = LEAGUES[state.league];
      elements.rankingTitle.textContent = `${league.label}リーグ TOP100`;
      const selectedKey = ivKey(state.input);
      const rows = state.rankings.slice(0, 100);
      const selectedInTop = selected && selected.rank <= 100;
      elements.rankingBody.innerHTML = "";

      rows.forEach((row) => appendRankingRow(row, ivKey(row.ivs) === selectedKey));
      if (selected && !selectedInTop) appendRankingRow(selected, true);

    function appendRankingRow(row, highlight) {
      const tr = document.createElement("tr");
      tr.className = highlight ? "highlight" : "";
      tr.innerHTML = `
        <td>${row.rank}</td>
        <td>${ivKey(row.ivs)}</td>
        <td>${row.level}</td>
        <td>${row.cp}</td>
        <td>${formatNumber(row.attack)}</td>
        <td>${formatNumber(row.defense)}</td>
        <td>${row.hp}</td>
        <td>${Math.round(row.statProduct).toLocaleString("ja-JP")}</td>
        <td>${formatNumber(row.percent, 2)}%</td>
      `;
      elements.rankingBody.appendChild(tr);
    }

    function calculate() {
      state.maxLevel = Number(elements.maxLevel.value);
      state.minIv = elements.minIvToggle.checked ? 10 : 0;
      state.input = {
        attack: clampIv(elements.atkIv.value),
        defense: clampIv(elements.defIv.value),
        stamina: clampIv(elements.staIv.value)
      };

      elements.atkIv.value = state.input.attack;
      elements.defIv.value = state.input.defense;
      elements.staIv.value = state.input.stamina;
      renderIvGauges();

      state.rankings = rankPokemon(state.pokemon, state.league, state.maxLevel, state.minIv);
      let selected = state.rankings.find((row) => ivKey(row.ivs) === ivKey(state.input));

      if (!selected && state.minIv > 0) {
        selected = bestBuildForIvs(state.pokemon, state.input, state.league, state.maxLevel);
        if (selected) {
          selected.rank = "-";
          selected.percent = (selected.statProduct / (state.rankings[0]?.statProduct || selected.statProduct)) * 100;
        }
      }

      renderResult(selected);
      renderRanking(selected);
    }

    elements.search.addEventListener("input", renderSuggestions);
    elements.maxLevel.addEventListener("change", calculate);
    elements.minIvToggle.addEventListener("change", calculate);
    elements.calculateButton.addEventListener("click", calculate);
    [elements.atkIv, elements.defIv, elements.staIv].forEach((input) => {
      input.addEventListener("change", calculate);
    });
    elements.screenshotFile.addEventListener("change", async () => {
      const file = elements.screenshotFile.files?.[0];
      if (!file) return;
      try {
        await handleScreenshotFile(file);
      } catch (error) {
        resetScanResult();
        setScanStatus(error.message || "スクショ解析に失敗しました。");
      }
    });
    elements.applyScanButton.addEventListener("click", applyScanResult);
    elements.scanPokemonSearch.addEventListener("input", () => {
      populateScanPokemonOptions(pokemonSearchCandidates(elements.scanPokemonSearch.value));
    });
    [elements.scanAttackInput, elements.scanDefenseInput, elements.scanStaminaInput].forEach((input) => {
      input.addEventListener("change", () => {
        input.value = clampIv(input.value);
      });
    });
    elements.clearScanButton.addEventListener("click", () => {
      elements.screenshotFile.value = "";
      elements.screenshotPreview.removeAttribute("src");
      elements.screenshotPreview.classList.remove("active");
      resetScanResult();
      setScanStatus("画像を選択すると解析を開始します。");
    });

    elements.manualTab.addEventListener("click", () => {
      elements.manualTab.classList.add("active");
      elements.imageTab.classList.remove("active");
      elements.manualInput.classList.remove("hidden");
      elements.imageInput.classList.add("hidden");
    });

    elements.imageTab.addEventListener("click", () => {
      elements.imageTab.classList.add("active");
      elements.manualTab.classList.remove("active");
      elements.imageInput.classList.remove("hidden");
      elements.manualInput.classList.add("hidden");
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".pokemon-picker")) {
        elements.suggestions.classList.remove("active");
      }
    });

    renderSelectedPokemon();
    renderLeagueButtons();
    renderIvGauges();
    calculate();
  </script>
</body>
</html>
