<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>スーパーリーグおすすめポケモン</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #65708a;
      --line: #dbe2ef;
      --blue: #2f6fed;
      --green: #1f9d72;
      --red: #d84b4b;
      --yellow: #f2b43b;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      background: #172033;
      color: #fff;
      border-bottom: 4px solid var(--yellow);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(#d84b4b 0 47%, #172033 47% 53%, #ffffff 53% 100%);
      border: 3px solid #fff;
      box-shadow: inset 0 0 0 3px #172033;
      flex: 0 0 auto;
      position: relative;
    }

    .mark::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #172033;
      position: absolute;
      inset: 0;
      margin: auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .toplink {
      color: #d8e2f5;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 18px 44px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .filters {
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(180px, 1.5fr) minmax(150px, 1fr) minmax(150px, 1fr) minmax(150px, 1fr);
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }

    .summary {
      margin-bottom: 16px;
      color: var(--muted);
      line-height: 1.7;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .identity {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .pokemon-art {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex: 0 0 auto;
      border-radius: 8px;
      background: linear-gradient(180deg, #f7faff, #edf2fb);
      border: 1px solid var(--line);
      padding: 5px;
    }

    .pokemon-art.is-hidden {
      display: none;
    }

    .name {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .name strong {
      font-size: 20px;
      letter-spacing: 0;
    }

    .dex,
    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .tier {
      min-width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff7df;
      color: #8a5b00;
      border: 1px solid #f3d47a;
      font-weight: 900;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: #244c9a;
      font-size: 12px;
      font-weight: 800;
    }

    .chip.cost-high { background: #fff1f1; color: #a33b3b; }
    .chip.cost-mid { background: #fff7df; color: #8a5b00; }
    .chip.cost-low { background: #e9f8f2; color: #166f51; }

    .facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .fact {
      padding: 9px 10px;
      background: #fbfcff;
      border-right: 1px solid var(--line);
      display: grid;
      gap: 2px;
    }

    .fact:last-child { border-right: 0; }

    .fact b {
      font-size: 12px;
      color: var(--muted);
    }

    .fact span {
      font-weight: 800;
      white-space: nowrap;
    }

    .moves,
    .text {
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 11px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
    }

    .button.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .source {
      margin-top: 18px;
      padding: 14px 16px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
    }

    .source a {
      color: var(--blue);
      font-weight: 800;
    }

    @media (max-width: 860px) {
      .filters,
      .cards {
        grid-template-columns: 1fr;
      }

      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 420px) {
      .pokemon-art {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <h1>スーパーリーグおすすめポケモン</h1>
      </div>
      <a class="toplink" href="./index.html">ツール一覧</a>
    </div>
  </header>
  <main>
    <p class="summary">
      CP1500以下のスーパーリーグで採用しやすい候補を、役割・技範囲・耐久・育成コストで整理しています。理想個体はこのアプリ内のSCP順位で計算しています。
    </p>

    <section class="panel filters" aria-label="絞り込み">
      <div class="field">
        <label for="search">検索</label>
        <input id="search" type="search" placeholder="ポケモン名・役割・技で検索">
      </div>
      <div class="field">
        <label for="roleFilter">役割</label>
        <select id="roleFilter">
          <option value="all">すべて</option>
        </select>
      </div>
      <div class="field">
        <label for="costFilter">育成コスト</label>
        <select id="costFilter">
          <option value="all">すべて</option>
          <option value="low">低め</option>
          <option value="mid">中</option>
          <option value="high">高め</option>
        </select>
      </div>
      <div class="field">
        <label for="sortBy">並び順</label>
        <select id="sortBy">
          <option value="tier">おすすめ度</option>
          <option value="rank">理想個体順位</option>
          <option value="name">名前</option>
        </select>
      </div>
    </section>

    <section id="cards" class="cards" aria-live="polite"></section>

    <section class="panel source">

      参考: <a href="https://pvpoke.com/rankings/all/1500/overall/" target="_blank" rel="noreferrer">PvPoke</a> /
      <a href="https://pokemongo.gamewith.jp/article/show/135809" target="_blank" rel="noreferrer">GameWith</a> /
      <a href="https://www.hundo-hunter.com/best/best-pokemon-for-great-league" target="_blank" rel="noreferrer">Hundo Hunter</a>
    </section>
  </main>

    const POKEMON = window.POKEMON_DATA || [];
    const TIER_SCORE = { SS: 0, S: 1, A: 2 };
    const COST_LABEL = { low: "低め", mid: "中", high: "高め" };
    const COST_CLASS = { low: "cost-low", mid: "cost-mid", high: "cost-high" };
    const rankCache = new Map();

    const elements = {
      search: document.querySelector("#search"),
      roleFilter: document.querySelector("#roleFilter"),
      costFilter: document.querySelector("#costFilter"),
      sortBy: document.querySelector("#sortBy"),
      cards: document.querySelector("#cards")

    function cpFor(pokemon, ivs, level) {
      const cpm = CP_MULTIPLIERS[level];
      return Math.max(10, Math.floor(((pokemon.attack + ivs.attack) * Math.sqrt(pokemon.defense + ivs.defense) * Math.sqrt(pokemon.stamina + ivs.stamina) * cpm * cpm) / 10));
    }

    function statsFor(pokemon, ivs, level) {
      const cpm = CP_MULTIPLIERS[level];
      const attack = (pokemon.attack + ivs.attack) * cpm;
      const defense = (pokemon.defense + ivs.defense) * cpm;
      const hp = Math.floor((pokemon.stamina + ivs.stamina) * cpm);
      return { attack, defense, hp, cp: cpFor(pokemon, ivs, level), statProduct: attack * defense * hp };
    }

    function bestBuildForIvs(pokemon, ivs, maxLevel = 50) {
      let best = null;
      for (let level = 1; level <= maxLevel; level += 0.5) {
        const stats = statsFor(pokemon, ivs, level);
        if (stats.cp <= 1500 && (!best || stats.statProduct > best.statProduct)) {
          best = { ...stats, level, ivs };
        }
      }
      return best;
    }

    function rankPokemon(pokemon) {
      const key = pokemon.sourceId || `${pokemon.id}:${pokemon.name}`;
      if (rankCache.has(key)) return rankCache.get(key);
      const rows = [];
      for (let attack = 0; attack <= 15; attack += 1) {
        for (let defense = 0; defense <= 15; defense += 1) {
          for (let stamina = 0; stamina <= 15; stamina += 1) {
            const build = bestBuildForIvs(pokemon, { attack, defense, stamina });
            if (build) rows.push(build);
          }
        }
      }
      rows.sort((a, b) => b.statProduct - a.statProduct || b.cp - a.cp || a.attack - b.attack);
      rows.forEach((row, index) => row.rank = index + 1);
      rankCache.set(key, rows);
      return rows;
    }

    function findPokemon(name) {
      return POKEMON.find((pokemon) => pokemon.name === name);
    }

    function ivText(ivs) {
      return `${ivs.attack}/${ivs.defense}/${ivs.stamina}`;
    }

    function pokemonImageUrl(item) {
      const imageId = item.imageId || item.pokemon.id;
      return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${imageId}.png`;
    }

    function buildItems() {
      return RECOMMENDATIONS.map((item) => {
        const pokemon = findPokemon(item.name);
        const rankings = pokemon ? rankPokemon(pokemon) : [];
        return {
          ...item,
          pokemon,
          best: rankings[0] || null
        };
      }).filter((item) => item.pokemon && item.best);
    }

    const items = buildItems();

    function populateRoles() {
      const roles = [...new Set(items.flatMap((item) => item.roles))].sort((a, b) => a.localeCompare(b, "ja"));
      roles.forEach((role) => {
        const option = document.createElement("option");
        option.value = role;
        option.textContent = role;
        elements.roleFilter.appendChild(option);
      });
    }

    function filteredItems() {
      const query = elements.search.value.trim().toLowerCase();
      const role = elements.roleFilter.value;
      const cost = elements.costFilter.value;
      return items.filter((item) => {
        const haystack = [
          item.name,
          item.pokemon.en,
          item.tier,
          item.moves,
          item.strength,
          item.caution,
          ...item.roles
        ].join(" ").toLowerCase();
        return (!query || haystack.includes(query)) &&
          (role === "all" || item.roles.includes(role)) &&
          (cost === "all" || item.cost === cost);
      }).sort((a, b) => {
        if (elements.sortBy.value === "name") return a.name.localeCompare(b.name, "ja");
        if (elements.sortBy.value === "rank") return a.best.rank - b.best.rank;
        return TIER_SCORE[a.tier] - TIER_SCORE[b.tier] || a.best.rank - b.best.rank;
      });
    }

    function render() {
      const rows = filteredItems();
      if (!rows.length) {
        elements.cards.innerHTML = '<div class="panel empty">条件に合うポケモンがありません。</div>';
        return;
      }
      elements.cards.innerHTML = rows.map((item) => {
        const checkerUrl = `./pokemon-go-iv-checker.html?pokemon=${encodeURIComponent(item.pokemon.sourceId || item.pokemon.name)}&league=great`;
        return `
          <article class="panel card">
            <div class="card-head">
              <div class="identity">
                <img class="pokemon-art" src="${pokemonImageUrl(item)}" alt="${item.name}" loading="lazy" onerror="this.classList.add('is-hidden')">
                <div class="name">
                  <strong>${item.name}</strong>
                  <span class="dex">No.${item.pokemon.id} / ${item.pokemon.en}</span>
                </div>
              </div>
              <div class="tier">${item.tier}</div>
            </div>
            <div class="chips">
              ${item.roles.map((role) => `<span class="chip">${role}</span>`).join("")}
              <span class="chip ${COST_CLASS[item.cost]}">育成${COST_LABEL[item.cost]}</span>
            </div>
            <div class="facts">
              <div class="fact"><b>理想個体</b><span>${ivText(item.best.ivs)}</span></div>
              <div class="fact"><b>PL / CP</b><span>${item.best.level} / ${item.best.cp}</span></div>
              <div class="fact"><b>SCP順位</b><span>${item.best.rank}位</span></div>
            </div>
            <p class="moves"><b>推奨技:</b> ${item.moves}</p>
            <p class="text">${item.strength}</p>
            <p class="text"><b>注意:</b> ${item.caution}</p>
            <div class="actions">
              <a class="button primary" href="${checkerUrl}">チェッカーで見る</a>
            </div>
          </article>
        `;
      }).join("");
    }

    populateRoles();
    render();
    [elements.search, elements.roleFilter, elements.costFilter, elements.sortBy].forEach((element) => {
      element.addEventListener("input", render);
      element.addEventListener("change", render);
    });
  </script>
</body>
</html>
